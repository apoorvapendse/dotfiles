# Vi keys in copy mode and status/command line
setw -g mode-keys vi
set -g status-keys vi

# Vim-like selection and yank to system clipboard (X11 + xclip)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Mouse support (optional; drag to select also copies)
set -g mouse on
